services:
  - type: web
    name: silvapinto-oportunidades
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --worker-class gthread --workers 1 --threads 4 --timeout 600 --graceful-timeout 600 --bind 0.0.0.0:$PORT
    envVars:
      - key: ACCESS_TOKEN
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FLASK_SECRET
        generateValue: true
      - key: MODEL_NAME
        value: claude-haiku-4-5-20251001
